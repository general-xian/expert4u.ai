<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert4U.ai | Global Expert Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 强制保持你原有的 UI 渐变和质感 */
        body { background: radial-gradient(circle at top right, #f8fafc, #eff6ff); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 24px; }
        .btn-primary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body class="antialiased">

    <nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto">
        <div class="text-2xl font-extrabold tracking-tight text-slate-900">Expert4U<span class="text-blue-600">.ai</span></div>
        <div class="flex gap-2">
            <button onclick="setLang('zh')" id="z" class="px-3 py-1 text-sm rounded-md border transition-all">中文</button>
            <button onclick="setLang('en')" id="e" class="px-3 py-1 text-sm rounded-md border transition-all">EN</button>
            <button onclick="setLang('de')" id="d" class="px-3 py-1 text-sm rounded-md border transition-all">DE</button>
            <button onclick="setLang('es')" id="s" class="px-3 py-1 text-sm rounded-md border transition-all">ES</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pt-16 pb-24 text-center">
        <h1 id="t" class="text-5xl md:text-6xl font-black text-slate-900 mb-6 tracking-tight">连接全球智慧</h1>
        <p id="st" class="text-lg text-slate-600 mb-12 max-w-2xl mx-auto leading-relaxed">寻找顶尖专家解决商业难题，或分享您的专业见解。</p>

        <div class="grid md:grid-cols-2 gap-8 mt-12">
            <div class="glass-card p-10 text-center flex flex-col items-center">
                <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center mb-6">
                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <h3 id="c1t" class="text-xl font-bold mb-4">发布咨询需求</h3>
                <p id="c1d" class="text-slate-500 mb-8">我们将为您匹配全球最合适的领域专家。</p>
                <button onclick="go('post')" id="b1" class="btn-primary w-full text-white py-4 rounded-xl font-bold">立即发布</button>
            </div>

            <div class="glass-card p-10 text-center flex flex-col items-center">
                <div class="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center mb-6">
                    <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                </div>
                <h3 id="c2t" class="text-xl font-bold mb-4">专家申请入驻</h3>
                <p id="c2d" class="text-slate-500 mb-8">加入全球精英库，分享知识赚取报酬。</p>
                <button onclick="go('join')" id="b2" class="w-full py-4 rounded-xl font-bold border-2 border-slate-200 hover:border-blue-600 transition-colors">申请加入</button>
            </div>
        </div>
    </main>

    <script>
        // 【只需改这里】钉钉表单链接
        const LINKS = {
            post: "https://dg-form.dingtalk.com/...", // https://alidocs.dingtalk.com/notable/share/form/v018K4nyeZLG5pQPnLb_hERWDMS_Ch2kXl8
            join: "https://dg-form.dingtalk.com/..."  // https://alidocs.dingtalk.com/notable/share/form/v01yBRq1ZPXEPAQyOdv_hERWDMS_9XYxdMt
        };

        const i18n = {
            zh: { t:"连接全球智慧", st:"寻找顶尖专家解决商业难题，或分享您的专业见解。", c1t:"发布咨询需求", c1d:"我们将为您匹配全球最合适的领域专家。", c2t:"专家申请入驻", c2d:"加入全球精英库，分享知识赚取报酬。", b1:"立即发布", b2:"申请加入" },
            en: { t:"Connect Global Wisdom", st:"Find top experts to solve business challenges or share insights.", c1t:"Post Requirement", c1d:"Get matched with the most suitable global experts.", c2t:"Join as Expert", c2d:"Join our global elite pool and monetize your knowledge.", b1:"Post Now", b2:"Join Now" },
            de: { t:"Globale Expertise", st:"Finden Sie Experten für geschäftliche Herausforderungen.", c1t:"Bedarf posten", c1d:"Finden Sie die passenden Experten weltweit.", c2t:"Experte werden", c2d:"Teilen Sie Ihr Wissen und verdienen Sie Geld.", b1:"Jetzt posten", b2:"Mitmachen" },
            es: { t:"Conectar Sabiduría", st:"Encuentre expertos para resolver desafíos comerciales.", c1t:"Publicar Requisito", c1d:"Conéctese con los expertos más adecuados.", c2t:"Unirse como Experto", c2d:"Únase a nuestra élite global y monetice su conocimiento.", b1:"Publicar", b2:"Unirse" }
        };

        function setLang(l) {
            const d = i18n[l];
            document.getElementById('t').innerText = d.t;
            document.getElementById('st').innerText = d.st;
            document.getElementById('c1t').innerText = d.c1t;
            document.getElementById('c1d').innerText = d.c1d;
            document.getElementById('c2t').innerText = d.c2t;
            document.getElementById('c2d').innerText = d.c2d;
            document.getElementById('b1').innerText = d.b1;
            document.getElementById('b2').innerText = d.b2;
            
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('bg-white', 'shadow-sm', 'border-blue-600');
                if(b.id === l[0]) b.classList.add('bg-white', 'shadow-sm', 'border-blue-600');
            });
            localStorage.setItem('L', l);
        }

        function go(type) {
            const url = LINKS[type];
            if(url.includes("...")) alert("请先在代码中填入你的钉钉表单链接！");
            else window.open(url, '_blank');
        }

        setLang(localStorage.getItem('L') || 'zh');
    </script>
</body>
</html>
